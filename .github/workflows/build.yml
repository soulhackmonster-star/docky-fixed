name: Build Docky
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -scheme Docky \
            -configuration Release \
            -derivedDataPath build/ \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r Docky-fixed.zip Docky.app

      - uses: actions/upload-artifact@v4
        with:
          name: Docky-fixed
          path: build/Build/Products/Release/Docky-fixed.zip
          retention-days: 7
